<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夺冠之路：女排精神中的马原密码</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: linear-gradient(135deg, #6f0000 0%, #102a43 62%, #071525 100%);
        color: #fff8e7;
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }

      .static-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .static-fallback-card {
        width: min(620px, 100%);
        border: 1px solid rgba(255, 248, 231, 0.22);
        border-radius: 22px;
        padding: 28px;
        background: rgba(255, 248, 231, 0.1);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      .static-fallback h1 {
        margin: 0 0 14px;
        color: #f5c542;
        font-size: 28px;
      }

      .static-fallback p {
        margin: 10px 0;
        line-height: 1.65;
      }

      .static-fallback code {
        display: inline-block;
        max-width: 100%;
        overflow-wrap: anywhere;
        color: #f5c542;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="static-fallback">
        <section class="static-fallback-card">
          <h1>夺冠之路：女排精神中的马原密码</h1>
          <p>页面正在加载。如果长时间停留在这里，请刷新一次，或换手机系统浏览器打开。</p>
          <p>投票页地址：</p>
          <code id="fallback-vote-url">https://volleyball-marx-game.vercel.app/vote</code>
        </section>
      </main>
    </div>
    <noscript>
      <main class="static-fallback">
        <section class="static-fallback-card">
          <h1>需要启用 JavaScript</h1>
          <p>请在浏览器中启用 JavaScript 后重新打开投票页。</p>
        </section>
      </main>
    </noscript>
    <script>
      (function () {
        var target = document.getElementById("fallback-vote-url");
        if (target && window.location && window.location.origin) {
          target.textContent = window.location.origin + "/vote";
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
